apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakerunner-ingest-logs
  labels:
    app.kubernetes.io/name: lakerunner-ingest
    app.kubernetes.io/component: lakerunner-ingest-logs
    app.kubernetes.io/part-of: lakerunner
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lakerunner-ingest
      app.kubernetes.io/component: lakerunner-ingest-logs
  #replicas: 1 # hpa will manage the number of replicas
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakerunner-ingest
        app.kubernetes.io/component: lakerunner-ingest-logs
        app.kubernetes.io/part-of: lakerunner
    spec:
      serviceAccountName: lakerunner
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: lakerunner
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          image: cardinalhq-lakerunner
          imagePullPolicy: Always
          command:
            - /app/bin/lakerunner
            - ingest-logs
          envFrom:
            - secretRef:
                name: postgresql-credentials
            - secretRef:
                name: datalake-bucket-claim
          env:
            - name: TMPDIR
              value: /scratch
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_SERVICE_NAME
              value: "lakerunner-ingest-logs"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4318"
          resources:
            requests:
              memory: 200Mi
              cpu: 500m
            limits:
              memory: 200Mi
              cpu: 1000m
          volumeMounts:
            - name: lakerunner-ingest-logs-scratch
              mountPath: /scratch
            - name: lakerunner-storage-profiles
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: lakerunner-storage-profiles
          configMap:
            name: lakerunner-storage-profiles
        - name: lakerunner-ingest-logs-scratch
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    storage: 2Gi
