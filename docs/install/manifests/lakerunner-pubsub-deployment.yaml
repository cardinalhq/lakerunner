apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakerunner-pubsub
  labels:
    app.kubernetes.io/name: lakerunner-pubsub
    app.kubernetes.io/component: lakerunner-pubsub
    app.kubernetes.io/part-of: lakerunner
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: lakerunner-pubsub
      app.kubernetes.io/component: lakerunner-pubsub
      app.kubernetes.io/part-of: lakerunner
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakerunner-pubsub
        app.kubernetes.io/component: lakerunner-pubsub
        app.kubernetes.io/part-of: lakerunner
    spec:
      serviceAccountName: lakerunner
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
      containers:
        - name: lakerunner
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          image: cardinalhq-lakerunner
          imagePullPolicy: Always
          command:
            - /app/bin/cardinalhq-lakerunner
            - pubsub
            - listen
          envFrom:
            - secretRef:
                name: postgresql-credentials
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_SERVICE_NAME
              value: "lakerunner-pubsub"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(HOST_IP):4318"
          resources:
            requests:
              memory: 200Mi
              cpu: 100m
            limits:
              memory: 200Mi
              cpu: 200m
          volumeMounts:
            - name: lakerunner-storage-profiles
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: lakerunner-storage-profiles
          configMap:
            name: lakerunner-storage-profiles
